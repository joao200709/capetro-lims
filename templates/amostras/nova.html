{% extends "base.html" %}

{% block title %}Nova Amostra{% endblock %}
{% block page_title %}Nova Amostra{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card-panel">
            <div class="card-panel-header">
                <h3><i class="bi bi-droplet-fill"></i> Cadastrar Nova Amostra</h3>
            </div>
            <div class="card-panel-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Produto</label>
                        <select name="produto_id" class="form-select" required>
                            <option value="">Selecione o produto...</option>
                            {% for p in produtos %}
                            <option value="{{ p.id }}">{{ p.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Número do Lote</label>
                            <input type="text" name="numero_lote" class="form-control"
                                   placeholder="Ex: CAP-2025-004" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data da Coleta</label>
                            <input type="date" name="data_coleta" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Responsável pela Coleta</label>
                        <input type="text" name="responsavel" class="form-control"
                               placeholder="Nome do responsável" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn-brand">
                            <i class="bi bi-check-lg"></i> Cadastrar Amostra
                        </button>
                        <a href="{{ url_for('listar_amostras') }}" class="btn-outline">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
