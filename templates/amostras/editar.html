{% extends "base.html" %}

{% block title %}Editar Amostra #{{ amostra.id }}{% endblock %}
{% block page_title %}Editar Amostra #{{ amostra.id }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card-panel">
            <div class="card-panel-header">
                <h3><i class="bi bi-pencil"></i> Editar Amostra</h3>
            </div>
            <div class="card-panel-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Produto</label>
                        <input type="text" class="form-control" value="{{ amostra.produto_nome }}" disabled>
                        <small class="text-muted">O produto não pode ser alterado.</small>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Número do Lote</label>
                            <input type="text" name="numero_lote" class="form-control"
                                   value="{{ amostra.numero_lote }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data da Coleta</label>
                            <input type="date" name="data_coleta" class="form-control"
                                   value="{{ amostra.data_coleta }}" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Responsável pela Coleta</label>
                        <input type="text" name="responsavel" class="form-control"
                               value="{{ amostra.responsavel }}" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn-brand">
                            <i class="bi bi-check-lg"></i> Salvar
                        </button>
                        <a href="{{ url_for('detalhe_amostra', amostra_id=amostra.id) }}" class="btn-outline">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
