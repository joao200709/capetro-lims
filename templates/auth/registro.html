<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta — Capetro LIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f1923;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-brand .icon {
            font-size: 36px;
            color: #f5a623;
        }
        .login-brand h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #0f1923;
            margin-top: 8px;
        }
        .login-brand p {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #1a1f36;
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #e5e7eb;
            font-family: inherit;
        }
        .form-control:focus, .form-select:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.12);
        }
        .btn-login {
            width: 100%;
            background: #1a73e8;
            color: #fff;
            border: none;
            padding: 11px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #1557b0; }
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #6b7280;
        }
        .login-footer a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 600;
        }
        .login-footer a:hover { text-decoration: underline; }
        .alert {
            font-size: 13px;
            border-radius: 8px;
            padding: 10px 14px;
        }
        .input-group-text {
            background: #f4f6f9;
            border: 1px solid #e5e7eb;
            border-right: none;
            color: #6b7280;
        }
        .input-group .form-control {
            border-left: none;
        }
        .senha-hint {
            font-size: 11px;
            color: #6b7280;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="icon">&#x2B21;</div>
                <h1>CAPETRO</h1>
                <p>Criar nova conta</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} mb-3">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nome completo</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="nome" class="form-control" placeholder="Seu nome" value="{{ form.nome if form else '' }}" required autofocus>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="seu@email.com" value="{{ form.email if form else '' }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cargo</label>
                    <select name="cargo" class="form-select">
                        <option value="Tecnico" {{ 'selected' if form and form.cargo == 'Tecnico' else '' }}>Técnico</option>
                        <option value="Analista" {{ 'selected' if form and form.cargo == 'Analista' else '' }}>Analista</option>
                        <option value="Coordenador" {{ 'selected' if form and form.cargo == 'Coordenador' else '' }}>Coordenador</option>
                        <option value="Gerente" {{ 'selected' if form and form.cargo == 'Gerente' else '' }}>Gerente</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="senha" class="form-control" placeholder="Crie uma senha" required minlength="6">
                    </div>
                    <div class="senha-hint">Mínimo de 6 caracteres</div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Confirmar senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" name="confirmar_senha" class="form-control" placeholder="Repita a senha" required minlength="6">
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="bi bi-person-plus"></i> Criar conta
                </button>
            </form>

            <div class="login-footer">
                Já tem conta? <a href="{{ url_for('login') }}">Fazer login</a>
            </div>
        </div>
    </div>
</body>
</html>
