{% extends "base.html" %}

{% block title %}Página não encontrada{% endblock %}
{% block page_title %}Erro 404{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top: 80px;">
    <div class="col-lg-5 text-center">
        <div style="font-size: 96px; font-weight: 800; color: var(--brand-primary); line-height: 1;">404</div>
        <h3 style="margin: 16px 0 8px; color: var(--text-primary);">Página não encontrada</h3>
        <p style="color: var(--text-secondary); margin-bottom: 24px;">
            O endereço que você tentou acessar não existe ou foi removido.
        </p>
        <a href="{{ url_for('dashboard') }}" class="btn-brand">
            <i class="bi bi-house"></i> Voltar ao Dashboard
        </a>
    </div>
</div>
{% endblock %}
